{% extends "base.html" %}

{% block title %}Register - EduCloud{% endblock %}

{% block content %}
<div class="container register-container d-flex align-items-center justify-content-center py-5">
    <div class="col-md-6">
        <div class="card p-4 p-md-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Create Account</h2>
                <p class="text-muted">Join our community and start learning today</p>
            </div>
            <form method="POST" action="{{ url_for('auth.register') }}">
                <div class="mb-3">
                    <label for="name" class="form-label fw-semibold">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                        <input type="text" class="form-control bg-light border-start-0" id="name" name="name" placeholder="John Doe" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Email address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                        <input type="email" class="form-control bg-light border-start-0" id="email" name="email" placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" class="form-control bg-light border-start-0" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold d-block">Register as:</label>
                    <div class="btn-group w-100" role="group">
                        <input type="radio" class="btn-check" name="role" id="role_student" value="student" checked autocomplete="off">
                        <label class="btn btn-outline-primary" for="role_student">
                            <i class="fas fa-user-graduate me-2"></i>Student
                        </label>

                        <input type="radio" class="btn-check" name="role" id="role_admin" value="admin" autocomplete="off">
                        <label class="btn btn-outline-primary" for="role_admin">
                            <i class="fas fa-user-shield me-2"></i>Administrator
                        </label>
                    </div>
                </div>
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
                </div>
                <div class="text-center mt-4">
                    <p class="mb-0 text-muted">Already have an account? <a href="{{ url_for('auth.login') }}" class="text-primary fw-bold text-decoration-none">Login here</a></p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
